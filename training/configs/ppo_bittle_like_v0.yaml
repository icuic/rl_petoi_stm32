seed: 7
total_timesteps: 10000
device: auto

env:
  model_path: sim/robots/bittle_like_v0.xml
  frame_skip: 10
  episode_steps: 1000
  n_envs: 1
  reward:
    survival: 0.1
    forward: 1.0
    upright: 0.2
    height: 0.5
    roll: 0.15
    pitch: 0.05
    angular_velocity: 0.005
    joint_velocity: 0.0005
    action: 0.002
    action_delta: 0.001
    fall: 0.2

ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 64
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [64, 64]
      vf: [64, 64]

paths:
  log_dir: training/logs/ppo_bittle_like_v0
  checkpoint_dir: training/checkpoints/ppo_bittle_like_v0
  final_model: training/checkpoints/ppo_bittle_like_v0/final_model.zip

checkpoint:
  save_freq: 2000
  name_prefix: ppo_bittle_like_v0

evaluation:
  episodes: 5
  deterministic: true
  report_path: experiments/reports/bittle_like_v0_eval.json
